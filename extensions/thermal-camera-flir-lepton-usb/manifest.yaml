schema_version: 1
id: com.altnautica.thermal-flir-lepton-usb
name: "ADOS Thermal Camera FLIR Lepton USB UVC"
version: "1.0.0"
description: "FLIR Lepton 3.5 radiometric thermal imaging via PureThermal 2 USB UVC dongle. Adds video overlay, FC config tab, and a MAVLink camera component."
author: "Altnautica"
homepage: "https://github.com/altnautica/ADOSExtensions/tree/main/extensions/thermal-camera-flir-lepton-usb"
license: "GPL-3.0-or-later"
risk: medium

compatibility:
  ados_version: ">=0.10.0"
  gcs_version: ">=0.5.0"
  supported_boards: ["cm4", "cm5", "rk3582", "rk3576", "rk3566", "x86"]

agent:
  entrypoint: "altnautica_thermal_camera.plugin:ThermalUsbPlugin"
  isolation: subprocess
  permissions:
    - id: hardware.usb.uvc
    - id: sensor.camera.register
    - id: telemetry.extend
    - id: event.publish
    - id: event.subscribe
    - id: recording.write
    - id: mavlink.component.camera
  resources:
    max_ram_mb: 192
    max_cpu_percent: 35
    max_pids: 16
  mavlink_components:
    - component_id: 100
      component_kind: camera
      sub_id: 1

gcs:
  entrypoint: "gcs/plugin.bundle.js"
  isolation: iframe
  permissions:
    - id: ui.slot.fc-tab
    - id: ui.slot.video-overlay
    - id: ui.slot.notification
    - id: ui.slot.settings-section
    - id: telemetry.subscribe.thermal
    - id: telemetry.subscribe.mavlink
    - id: mission.read
    - id: mission.write
    - id: recording.write
  contributes:
    panels:
      - id: thermal-overlay
        slot: video.overlay
        title: "Thermal"
        icon: "thermometer"
      - id: thermal-config
        slot: fc.tab
        title: "Thermal Camera"
        icon: "camera"
        order: 50
    notifications:
      - id: thermal-alarm
        title: "Thermal alarm"
        severity: warning
  locales:
    - en
