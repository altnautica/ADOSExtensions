schema_version: 1
id: com.altnautica.mavlink-gimbal-v2
name: "ADOS MAVLink Gimbal v2 Controller"
version: "1.0.0"
description: "MAVLink Gimbal v2 control with optional SimpleBGC, Storm32 NT, and Gremsy driver paths. Manual sliders, ROI lock-on-target, follow-me."
author: "Altnautica"
homepage: "https://github.com/altnautica/ADOSExtensions/tree/main/extensions/mavlink-gimbal-v2"
license: "GPL-3.0-or-later"
risk: medium

compatibility:
  ados_version: ">=0.10.0"
  gcs_version: ">=0.5.0"
  supported_boards: ["*"]

agent:
  entrypoint: "altnautica_gimbal_v2.plugin:GimbalV2Plugin"
  isolation: subprocess
  permissions:
    - id: hardware.uart
    - id: mavlink.read
    - id: mavlink.write
    - id: mavlink.component.gimbal
    - id: event.publish
    - id: event.subscribe
    - id: telemetry.extend
  resources:
    max_ram_mb: 64
    max_cpu_percent: 15
    max_pids: 8
  mavlink_components:
    - component_id: 154
      component_kind: gimbal
      sub_id: 0

gcs:
  entrypoint: "gcs/plugin.bundle.js"
  isolation: iframe
  permissions:
    - id: ui.slot.fc-tab
    - id: ui.slot.video-overlay
    - id: ui.slot.notification
    - id: ui.slot.settings-section
    - id: telemetry.subscribe.gimbal
    - id: telemetry.subscribe.mavlink
    - id: mission.read
    - id: mission.write
    - id: command.send
  contributes:
    panels:
      - id: gimbal-control
        slot: fc.tab
        title: "Gimbal"
        icon: "gimbal"
        order: 60
      - id: gimbal-reticle
        slot: video.overlay
        title: "Gimbal reticle"
        icon: "crosshair"
    notifications:
      - id: gimbal-health
        title: "Gimbal health"
        severity: warning
  locales:
    - en
