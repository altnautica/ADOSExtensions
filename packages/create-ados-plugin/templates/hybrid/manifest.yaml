schema_version: 1
id: __PLUGIN_ID__
name: "Hello Hybrid Plugin"
version: "0.1.0"
description: "Skeleton hybrid plugin generated by create-ados-plugin."
author: "__PLUGIN_AUTHOR__"
license: "GPL-3.0-or-later"
risk: low

compatibility:
  ados_version: ">=0.10.0"
  gcs_version: ">=0.5.0"
  supported_boards: ["*"]

agent:
  entrypoint: "agent/plugin.py"
  isolation: subprocess
  permissions:
    - id: event.publish
  resources:
    max_ram_mb: 64
    max_cpu_percent: 10
    max_pids: 4

gcs:
  entrypoint: "gcs/plugin.bundle.js"
  isolation: iframe
  permissions:
    - id: ui.slot.fc-tab
  contributes:
    panels:
      - id: hello-tab
        slot: fc.tab
        title: "Hello"
        order: 99
  locales:
    - en
