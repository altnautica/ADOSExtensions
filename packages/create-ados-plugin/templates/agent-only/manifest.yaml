plugin:
  id: __PLUGIN_ID__
  name: "Hello Agent Plugin"
  version: "0.1.0"
  author: "__PLUGIN_AUTHOR__"
  license: "GPL-3.0-or-later"
  description: "Skeleton agent-only plugin generated by create-ados-plugin."
  tags: []

compatibility:
  ados_version: ">=0.10.0"
  python_version: ">=3.11"
  min_tier: 0
  supported_boards: ["*"]
  profiles: ["drone"]

agent:
  entrypoint: "agent/plugin.py"
  isolation: "subprocess"
  permissions:
    - event.publish
  resources:
    max_ram_mb: 64
    max_cpu_percent: 10
    max_pids: 4

assets:
  - path: "agent/plugin.py"
    role: "agent-entrypoint"
    sha256: "<computed-by-pack.sh>"

signing:
  signature: "<computed-by-sign.sh>"
  signer_key_id: "your-key-id"
  algorithm: "ed25519"
